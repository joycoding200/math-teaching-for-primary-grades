<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学思维小课堂</title>
<style>
/* ====== CSS Variables ====== */
:root {
  --c1:#ff6b6b; --c2:#4ecdc4; --c3:#feca57; --c4:#a29bfe; --c5:#fd79a8; --c6:#00b894;
  --bg:#f0f4ff; --card:#fff; --text:#2d3436; --sub:#636e72; --radius:18px; --shadow:0 4px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  background:var(--bg); min-height:100vh; color:var(--text);
  user-select:none; -webkit-user-select:none;
}
/* ====== Top Bar ====== */
.topbar{
  background:linear-gradient(135deg,#ff6b6b,#feca57); color:#fff; padding:14px 20px;
  display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50;
  box-shadow:0 2px 12px rgba(255,107,107,.3);
}
.topbar h1{font-size:20px;flex:1}
.topbar .back-btn{
  background:rgba(255,255,255,.25); border:none; color:#fff; width:36px;height:36px;
  border-radius:50%; font-size:20px; cursor:pointer; display:none; align-items:center; justify-content:center;
}
.topbar .back-btn.show{display:flex}
.topbar .stars-total{font-size:14px;opacity:.9}

/* ====== Main Container ====== */
.container{max-width:960px;margin:0 auto;padding:16px}

/* ====== Menu Grid ====== */
.menu-view{}
.section-title{font-size:18px;margin:20px 0 10px;color:var(--sub);display:flex;align-items:center;gap:8px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:8px}
.topic-card{
  background:var(--card);border-radius:var(--radius);padding:16px 10px;text-align:center;
  cursor:pointer;transition:all .25s;box-shadow:var(--shadow);position:relative;overflow:hidden;
  border:2px solid transparent;
}
.topic-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.14);border-color:var(--c1)}
.topic-card .icon{font-size:36px;display:block;margin-bottom:6px}
.topic-card .name{font-size:14px;font-weight:700;color:var(--text)}
.topic-card .stars{font-size:11px;color:#feca57;margin-top:3px}
.topic-card .badge{position:absolute;top:8px;right:8px;background:var(--c1);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px}

/* ====== Game View ====== */
.game-view{display:none;flex-direction:column;gap:14px}
.game-view.active{display:flex}
.game-header{text-align:center}
.game-header h2{font-size:22px}
.game-header .desc{font-size:13px;color:var(--sub);margin-top:4px}

/* Stage tabs */
.stage-tabs{display:flex;gap:0;background:#e9ecef;border-radius:30px;padding:3px;align-self:center}
.stage-tab{
  padding:8px 20px;border:none;background:none;border-radius:28px;font-size:13px;font-weight:600;
  cursor:pointer;color:#868e96;transition:all .3s;font-family:inherit;
}
.stage-tab.active{background:#fff;color:var(--c1);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.stage-content{min-height:300px;background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:14px}
.stage-panel{display:none;flex-direction:column;align-items:center;gap:14px;width:100%}
.stage-panel.active{display:flex}

/* ====== Shared Components ====== */
.btn{
  padding:10px 24px;border:none;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;
  transition:all .25s;font-family:inherit;
}
.btn-p{background:var(--c1);color:#fff}
.btn-p:hover{opacity:.85;transform:translateY(-1px)}
.btn-s{background:var(--c2);color:#fff}
.btn-o{background:#fff;color:var(--c1);border:2px solid var(--c1)}
.btn-o:hover{background:#fff5f5}
.btn:disabled{opacity:.4;pointer-events:none}

.feedback{font-size:14px;min-height:22px;text-align:center;font-weight:600}
.feedback.ok{color:#00b894}
.feedback.err{color:var(--c1)}

.answer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;font-size:16px}
.answer-input{
  width:72px;padding:10px;text-align:center;border:2px solid #dee2e6;border-radius:12px;
  font-size:18px;font-weight:700;font-family:inherit;transition:border-color .3s;
}
.answer-input:focus{outline:none;border-color:var(--c2)}
.answer-input.ok{border-color:#00b894;background:#f0fff4}
.answer-input.err{border-color:var(--c1);background:#fff5f5;animation:shake .4s}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ====== Balance Scale ====== */
.scale-wrap{position:relative;width:100%;max-width:400px;height:240px;margin:0 auto}
.scale-wrap svg{width:100%;height:100%}
.scale-items{position:absolute;display:flex;gap:2px;flex-wrap:wrap;justify-content:center;align-items:flex-end;pointer-events:none}
.scale-left{left:10%;bottom:22%;width:26%}
.scale-right{right:10%;bottom:22%;width:26%}
.scale-item{font-size:26px;pointer-events:auto;cursor:pointer;transition:all .3s;line-height:1}
.scale-item:hover{transform:scale(1.2)}
.scale-item.removing{opacity:0;transform:scale(0)}

/* ====== Bar Model ====== */
.bar-wrap{width:100%;max-width:440px}
.bar-row{display:flex;align-items:center;gap:6px;margin:6px 0}
.bar-lbl{font-weight:700;font-size:15px;min-width:40px;text-align:center}
.bar-track{flex:1;height:36px;background:#f1f3f5;border-radius:10px;position:relative;overflow:visible}
.bar-fill{height:100%;border-radius:10px;transition:width .5s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;min-width:36px}
.bar-fill.a{background:linear-gradient(90deg,#ff6b6b,#ff8787)}
.bar-fill.b{background:linear-gradient(90deg,#4ecdc4,#63e6be)}
.bar-fill.d{background:linear-gradient(90deg,#feca57,#ffd43b);color:#495057}
.bar-seg{display:flex;width:100%;height:100%;gap:2px}
.bar-seg span{flex:1;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;border-radius:4px}
.bar-seg span.hl{background:rgba(255,255,255,.55)}

/* ====== Slider ====== */
.slider-grp{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:6px}
.slider-grp label{font-weight:600;font-size:14px}
.slider-val{font-size:22px;font-weight:700;color:var(--c1);background:#fff5f5;padding:3px 14px;border-radius:16px}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:8px;background:#e9ecef;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--c1);cursor:pointer;box-shadow:0 2px 8px rgba(255,107,107,.4)}

/* ====== Venn ====== */
.venn-wrap{position:relative;width:300px;height:220px;margin:0 auto}
.venn-wrap svg{width:100%;height:100%}
.venn-wrap .region{cursor:pointer;transition:opacity .3s}
.venn-wrap .region:hover{opacity:.7}

/* ====== Grid items ====== */
.item-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.item-chip{
  background:#f8f9fa;border:2px solid #dee2e6;border-radius:12px;padding:8px 14px;
  font-size:16px;cursor:pointer;transition:all .25s;font-weight:600;
}
.item-chip:hover{border-color:var(--c2);background:#f0fffc}
.item-chip.selected{background:var(--c2);color:#fff;border-color:var(--c2)}
.item-chip.wrong{background:var(--c1);color:#fff;border-color:var(--c1);animation:shake .4s}

/* ====== Character animation area ====== */
.anim-track{position:relative;width:100%;max-width:500px;height:80px;background:#f8f9fa;border-radius:16px;overflow:hidden}
.anim-char{position:absolute;font-size:36px;transition:left .1s linear;bottom:8px}
.anim-home{position:absolute;bottom:4px;font-size:11px;color:var(--sub);font-weight:600}

/* ====== Celebration ====== */
.cele{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}
.cele .confetti{position:absolute;animation:fall 1.6s ease-out forwards}
@keyframes fall{0%{transform:translateY(-80px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ====== Trees on path ====== */
.tree-row{display:flex;gap:0;align-items:center;flex-wrap:wrap;justify-content:center}
.tree{font-size:28px;transition:all .3s}
.tree-spacer{width:30px;height:4px;background:#e9ecef;transition:width .3s}

/* ====== Responsive ====== */
@media(max-width:600px){
  .topic-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .topic-card{padding:12px 6px}
  .topic-card .icon{font-size:28px}
  .topic-card .name{font-size:12px}
  .topbar h1{font-size:17px}
  .scale-wrap{height:200px}
  .scale-item{font-size:22px}
}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <button class="back-btn" id="backBtn" onclick="goMenu()">←</button>
  <h1 id="topTitle">🧮 数学思维小课堂</h1>
  <span class="stars-total" id="starTotal">⭐ 0</span>
</div>

<div class="container" id="container">
<!-- ==================== MENU ==================== -->
<div class="menu-view" id="menuView"></div>

<!-- ==================== GAME VIEW ==================== -->
<div class="game-view" id="gameView">
  <div class="game-header"><h2 id="gameTitle"></h2><div class="desc" id="gameDesc"></div></div>
  <div class="stage-tabs" id="stageTabs">
    <button class="stage-tab active" data-stage="1">🎯 看一看</button>
    <button class="stage-tab" data-stage="2">🤹 玩一玩</button>
    <button class="stage-tab" data-stage="3">🏆 练一练</button>
  </div>
  <div class="stage-content" id="stageContent"></div>
</div>
</div>

<div class="cele" id="cele"></div>

<script>
// ==================== FRAMEWORK ====================
const TOPICS = [
  // 一年级：直观感知与简单规律
  {id:'pattern',icon:'🔮',name:'找规律',cat:'一年级',g:'pattern'},
  {id:'countshape',icon:'🔷',name:'数图形',cat:'一年级',g:'countshape'},
  {id:'balance',icon:'🎯',name:'移多补少',cat:'一年级',g:'balance'},
  {id:'simplelogic',icon:'🔍',name:'简单推理',cat:'一年级',g:'simplelogic'},
  {id:'queue',icon:'👫',name:'排队问题',cat:'一年级',g:'queue'},
  // 二年级：等量关系与基础应用
  {id:'substitution',icon:'⚖️',name:'等量代换',cat:'二年级',g:'substitution'},
  {id:'cycle',icon:'🔁',name:'周期问题',cat:'二年级',g:'cycle'},
  {id:'tree',icon:'🌳',name:'植树问题',cat:'二年级',g:'tree'},
  {id:'normalization',icon:'🧮',name:'归一问题',cat:'二年级',g:'normalization'},
  {id:'sumdiff',icon:'📐',name:'和差问题',cat:'二年级',g:'sumdiff'},
  // 三年级：倍数关系与逆向思维
  {id:'summulti',icon:'📏',name:'和倍问题',cat:'三年级',g:'summulti'},
  {id:'diffmulti',icon:'📊',name:'差倍问题',cat:'三年级',g:'diffmulti'},
  {id:'age',icon:'👴',name:'年龄问题',cat:'三年级',g:'age'},
  {id:'profitloss',icon:'📦',name:'盈亏问题',cat:'三年级',g:'profitloss'},
  {id:'reverse',icon:'↩️',name:'还原问题',cat:'三年级',g:'reverse'},
  {id:'average',icon:'📈',name:'平均数',cat:'三年级',g:'average'},
  // 四年级：经典模型与原理
  {id:'chickenrabbit',icon:'🐔',name:'鸡兔同笼',cat:'四年级',g:'chickenrabbit'},
  {id:'venn',icon:'🔴',name:'容斥原理',cat:'四年级',g:'venn'},
  {id:'pigeonhole',icon:'🗄️',name:'抽屉原理',cat:'四年级',g:'pigeonhole'},
  {id:'logic',icon:'🧩',name:'逻辑推理',cat:'四年级',g:'logic'},
  {id:'meeting',icon:'🏃',name:'相遇问题',cat:'四年级',g:'meeting'},
  {id:'chase',icon:'💨',name:'追及问题',cat:'四年级',g:'chase'},
  // 五年级：综合应用与抽象建模
  {id:'boatcurrent',icon:'⛵',name:'流水行船',cat:'五年级',g:'boatcurrent'},
  {id:'work',icon:'🔧',name:'工程问题',cat:'五年级',g:'work'},
  {id:'cowgrass',icon:'🐄',name:'牛吃草',cat:'五年级',g:'cowgrass'},
];

const GAMES = {};
let currentGame = null;
let gameStage = 1;
let gameState = {};

function loadProgress(){ try{ return JSON.parse(localStorage.getItem('mathgames')||'{}'); }catch(e){ return {}; } }
function saveProgress(p){ localStorage.setItem('mathgames',JSON.stringify(p)); }
function getStars(gameId){ const p=loadProgress(); return p[gameId]||0; }
function setStars(gameId,stars){ const p=loadProgress(); p[gameId]=Math.max(p[gameId]||0,stars); saveProgress(p); updateStarTotal(); }

function updateStarTotal(){
  const p=loadProgress(); let t=0; Object.values(p).forEach(v=>t+=v);
  document.getElementById('starTotal').textContent='⭐ '+t;
}

// Render menu
function renderMenu(){
  const cats=[...new Set(TOPICS.map(t=>t.cat))];
  const grades={'一年级':{emoji:'🌱',desc:'直观感知·简单规律',color:'#ff6b6b'},
               '二年级':{emoji:'🌿',desc:'等量关系·基础应用',color:'#4ecdc4'},
               '三年级':{emoji:'🌳',desc:'倍数关系·逆向思维',color:'#feca57'},
               '四年级':{emoji:'🌲',desc:'经典模型·原理入门',color:'#a29bfe'},
               '五年级':{emoji:'🏆',desc:'综合应用·抽象建模',color:'#fd79a8'}};
  let h='';
  cats.forEach(cat=>{
    const g=grades[cat]||{emoji:'📚',desc:'',color:'#636e72'};
    h+='<div class="section-title"><span style="font-size:24px">'+g.emoji+'</span> <span style="color:'+g.color+'">'+cat+'</span><span style="font-size:11px;color:#adb5bd;margin-left:8px">'+g.desc+'</span></div><div class="topic-grid">';
    TOPICS.filter(t=>t.cat===cat).forEach(t=>{
      const s=getStars(t.id);
      h+='<div class="topic-card" onclick="openGame(\''+t.id+'\')">';
      h+='<span class="icon">'+t.icon+'</span>';
      h+='<span class="name">'+t.name+'</span>';
      h+='<div class="stars">'+'⭐'.repeat(s)+'☆'.repeat(3-s)+'</div>';
      if(s>=3) h+='<span class="badge" style="background:#00b894">✓</span>';
      h+='</div>';
    });
    h+='</div>';
  });
  document.getElementById('menuView').innerHTML=h;
}

function goMenu(){
  document.getElementById('menuView').style.display='block';
  document.getElementById('gameView').classList.remove('active');
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('topTitle').textContent='🧮 数学思维小课堂';
  currentGame=null;
  renderMenu();
}

function openGame(gameId){
  currentGame=gameId;
  gameStage=1;
  gameState={};
  document.getElementById('menuView').style.display='none';
  document.getElementById('gameView').classList.add('active');
  document.getElementById('backBtn').classList.add('show');
  const t=TOPICS.find(x=>x.id===gameId);
  document.getElementById('topTitle').textContent=t.icon+' '+t.name;
  document.getElementById('gameTitle').textContent=t.name;
  document.getElementById('gameDesc').textContent=t.cat+' · 小学奥数思维训练';
  // Reset stage tabs
  document.querySelectorAll('#stageTabs .stage-tab').forEach((b,i)=>{
    b.classList.toggle('active',i===0);
  });
  renderGameStage();
}

function switchStage(stage){
  gameStage=stage;
  document.querySelectorAll('#stageTabs .stage-tab').forEach((b,i)=>{
    b.classList.toggle('active',i+1===stage);
  });
  renderGameStage();
}

function renderGameStage(){
  if(!currentGame) return;
  const g=GAMES[currentGame];
  const container=document.getElementById('stageContent');
  if(!g){ container.innerHTML='<p>游戏开发中...</p>'; return; }
  const fn=g['stage'+gameStage];
  if(fn) fn(container);
  else container.innerHTML='<p>加载中...</p>';
}

// Init stage tabs
document.querySelectorAll('#stageTabs .stage-tab').forEach(btn=>{
  btn.addEventListener('click',()=>switchStage(parseInt(btn.dataset.stage)));
});

function celebrate(){
  const c=document.getElementById('cele');
  const cols=['#ff6b6b','#feca57','#4ecdc4','#a29bfe','#fd79a8','#00b894','#ffd93d','#6c5ce7'];
  for(let i=0;i<50;i++){
    const el=document.createElement('div'); el.className='confetti';
    el.style.left=Math.random()*100+'%'; el.style.top=-(Math.random()*40)+'px';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDelay=Math.random()*.5+'s';
    el.style.animationDuration=(1+Math.random()*1.5)+'s';
    el.style.borderRadius=Math.random()>.5?'50%':'3px';
    el.style.width=(6+Math.random()*10)+'px'; el.style.height=(6+Math.random()*10)+'px';
    c.appendChild(el); setTimeout(()=>el.remove(),2000);
  }
}

// ====== Shared helpers ======
function makeScaleSVG(){return '<svg viewBox="0 0 400 220"><polygon points="200,210 185,170 215,170" fill="#adb5bd"/><line x1="60" y1="160" x2="340" y2="160" stroke="#495057" stroke-width="5"/><line x1="100" y1="160" x2="100" y2="192" stroke="#adb5bd" stroke-width="2"/><line x1="300" y1="160" x2="300" y2="192" stroke="#adb5bd" stroke-width="2"/><ellipse cx="100" cy="198" rx="42" ry="10" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/><ellipse cx="300" cy="198" rx="42" ry="10" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/></svg>';}

function drawBarModel(aVal,bVal,aLabel,bLabel,multiplier,diff){
  const max=Math.max(aVal,bVal)*1.25;
  const ap=(aVal/max*100); const bp=(bVal/max*100);
  let segs=''; for(let i=0;i<multiplier;i++) segs+='<span'+(i===multiplier-1?' class="hl"':'')+'></span>';
  return '<div class="bar-wrap"><div class="bar-row"><span class="bar-lbl">'+aLabel+'</span><div class="bar-track"><div class="bar-fill a" style="width:'+ap+'%"><div class="bar-seg">'+segs+'</div></div></div><span style="font-weight:700;color:#ff6b6b">'+aVal+'</span></div><div class="bar-row"><span class="bar-lbl">'+bLabel+'</span><div class="bar-track"><div class="bar-fill b" style="width:'+bp+'%"><span>'+bVal+'</span></div></div><span style="font-weight:700;color:#4ecdc4">'+bVal+'</span></div><p style="text-align:center;color:#868e96;font-size:13px;margin-top:6px">'+aLabel+' - '+bLabel+' = <b style="color:#f59f00">'+diff+'</b>，'+aLabel+' 是 '+bLabel+' 的 <b style="color:#ff6b6b">'+multiplier+'倍</b></p></div>';
}

function genRandInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

// ==================== GAME 1: 等量代换 ====================
GAMES.substitution = {
  stage1(container){
    gameState={pineapple:1,apple:3,currentApples:3};
    container.innerHTML='<p style="text-align:center;font-size:15px;color:#495057">天平两边一样重时，天平<strong>平衡</strong>。<br>看，1个🍍 和 3个🍎 一样重！</p><div class="scale-wrap"><div id="s1svg"></div><div class="scale-items scale-left" id="s1L"></div><div class="scale-items scale-right" id="s1R"></div></div><p style="color:#adb5bd;font-size:13px">✅ 天平平衡 → 1🍍 = 3🍎</p>';
    document.getElementById('s1svg').innerHTML=makeScaleSVG();
    document.getElementById('s1L').innerHTML='<span class="scale-item" style="animation:pop .4s">🍍</span>';
    document.getElementById('s1R').innerHTML='<span class="scale-item" style="animation:pop .4s">🍎</span><span class="scale-item" style="animation:pop .4s .1s">🍎</span><span class="scale-item" style="animation:pop .4s .2s">🍎</span>';
  },
  stage2(container){
    gameState={applesLeft:3,bananasPlaced:0};
    container.innerHTML=
      '<p style="text-align:center;font-size:15px">已知 1个🍍 = 3个🍎，而且 1个🍎 = 2个🍌<br>点击苹果，换成香蕉试试！</p>'+
      '<div class="scale-wrap"><div id="s2svg"></div><div class="scale-items scale-left" id="s2L"></div><div class="scale-items scale-right" id="s2R"></div></div>'+
      '<div style="background:#fff3bf;padding:10px 20px;border-radius:14px;border:2px dashed #feca57;display:flex;align-items:center;gap:10px"><span>1个</span><span style="font-size:28px">🍎</span><span style="font-weight:700;color:#f59f00">=</span><span>2个</span><span style="font-size:28px">🍌</span></div>'+
      '<p class="feedback" id="s2fb">点击右边的苹果来替换吧！已替换: 0/3</p>'+
      '<button class="btn btn-o" onclick="GAMES.substitution.resetS2()">🔄 重置</button>';
    document.getElementById('s2svg').innerHTML=makeScaleSVG();
    document.getElementById('s2L').innerHTML='<span class="scale-item">🍍</span>';
    const r=document.getElementById('s2R');
    r.innerHTML='';
    for(let i=0;i<3;i++){

      '<div class="slider-grp"><label>船速(km/h)</label><span class="slider-val" id="bcVV">'+v+'</span><input type="range" id="bcVS" min="10" max="30" value="'+v+'" oninput="GAMES.boatcurrent.upd()"></div>'+
      '<div class="slider-grp"><label>水速(km/h)</label><span class="slider-val" id="bcCV">'+c+'</span><input type="range" id="bcCS" min="1" max="8" value="'+c+'" oninput="GAMES.boatcurrent.upd()"></div>'+
      '<p style="text-align:center;font-size:18px">顺水速度 = <b style="color:#ff6b6b">'+down+'</b> km/h &nbsp;|&nbsp; 逆水速度 = <b style="color:#4ecdc4">'+up+'</b> km/h</p>'+
      '<p style="font-size:12px;color:#adb5bd;text-align:center">船速=('+down+'+'+up+')÷2='+v+' &nbsp; 水速=('+down+'-'+up+')÷2='+c+'</p>';
  },
  upd(){
    gameState.bcV=parseInt(document.getElementById('bcVS').value);
    gameState.bcC=parseInt(document.getElementById('bcCS').value);
    if(gameState.bcC>=gameState.bcV) gameState.bcC=Math.max(1,gameState.bcV-2);
    document.getElementById('bcVV').textContent=gameState.bcV;
    document.getElementById('bcCV').textContent=gameState.bcC;
    document.getElementById('bcCS').value=gameState.bcC;
    GAMES.boatcurrent.renderBC();
  },
  stage3(container){
    // Type 1: given v,c, find down/up speed; Type 2: given down/up, find v,c
    const type=Math.random();
    if(type<0.5){
      const v=genRandInt(12,25),c=genRandInt(2,Math.min(8,Math.floor(v/3)));
      const down=v+c,up=v-c;gameState.bcAns3=v;gameState.bcQ=
        '一艘船在静水中速度'+v+'km/h，水流速度'+c+'km/h。顺水速度和逆水速度各是多少？'+'<br><small style="color:#adb5bd">顺水:</small>';
      gameState.bcDown=down;gameState.bcUp=up;gameState.bcMode='two';gameState.bcVAns=v;gameState.bcCAns=c;
    }else{
      // 顺水速度a, 逆水速度b, both same parity → v=(a+b)/2, c=(a-b)/2
      const v=genRandInt(12,22),c=genRandInt(2,Math.min(6,Math.floor(v/4)));
      const down=v+c,up=v-c;
      gameState.bcAns3=v;gameState.bcVAns=v;gameState.bcCAns=c;
      gameState.bcQ='一条河，顺水速度'+down+'km/h，逆水速度'+up+'km/h。船速和水速各是多少？'+'<br><small style="color:#adb5bd">船速:</small>';
      gameState.bcDown=down;gameState.bcUp=up;gameState.bcMode='two2';
    }
    container.innerHTML=
      '<p style="text-align:center;font-weight:700">'+gameState.bcQ+'</p>'+
      '<div class="answer-row"><input class="answer-input" id="bcAns1" placeholder="顺水/船速">'+
      (gameState.bcMode.startsWith('two')?'<input class="answer-input" id="bcAns2" placeholder="逆水/水速">':'')+
      '<button class="btn btn-p" onclick="GAMES.boatcurrent.check3()">确认</button></div>'+
      '<p class="feedback" id="bcfb"></p><button class="btn btn-o" onclick="renderGameStage()">🔄 换一题</button>';
  },
  check3(){
    const fb=document.getElementById('bcfb');
    if(gameState.bcMode==='two'){
      const a1=parseInt(document.getElementById('bcAns1').value),a2=parseInt(document.getElementById('bcAns2').value);
      if(isNaN(a1)||isNaN(a2)){fb.textContent='请填写完整';return}
      if(a1===gameState.bcDown&&a2===gameState.bcUp){fb.textContent='✅ 正确！顺水=v+c='+gameState.bcDown+'，逆水=v-c='+gameState.bcUp;fb.className='feedback ok';setStars('boatcurrent',3);celebrate();updateStarTotal()}
      else{fb.textContent='❌ 顺水=v+c，逆水=v-c';fb.className='feedback err'}
    }else{
      const a1=parseInt(document.getElementById('bcAns1').value),a2=parseInt(document.getElementById('bcAns2').value);
      if(isNaN(a1)||isNaN(a2)){fb.textContent='请填写完整';return}
      if(a1===gameState.bcVAns&&a2===gameState.bcCAns){fb.textContent='✅ 正确！船速=('+gameState.bcDown+'+'+gameState.bcUp+')÷2='+gameState.bcVAns+'，水速=('+gameState.bcDown+'-'+gameState.bcUp+')÷2='+gameState.bcCAns;fb.className='feedback ok';setStars('boatcurrent',3);celebrate();updateStarTotal()}
      else{fb.textContent='❌ 船速=(顺+逆)÷2，水速=(顺-逆)÷2';fb.className='feedback err'}
    }
  }
};

// ==================== GAME 25: 牛吃草问题 ====================
GAMES.cowgrass = {
  stage1(container){
    container.innerHTML='<p style="text-align:center;font-size:14px;line-height:1.9">🐄 <b>牛吃草问题</b>（牛顿问题）<br><br>草地每天匀速长草，牛每天吃固定量的草<br><br>例：<b>8头牛10天</b>吃完，<b>11头牛5天</b>吃完<br><br>每天长草量：(8×10-11×5)÷(10-5)=<b>5份</b><br>原有草量：8×10-5×10=<b>30份</b><br><br>问：<b>7头牛</b>吃几天？<br>30÷(7-5)=<b>15天</b> ✅<br><br>📌 先求<b>每天长草量</b>，再求<b>原有草量</b></p>';
  },
  stage2(container){
    gameState.cgN1=8;gameState.cgT1=10;gameState.cgN2=11;gameState.cgT2=5;
    gameState.cgG=(gameState.cgN1*gameState.cgT1-gameState.cgN2*gameState.cgT2)/(gameState.cgT1-gameState.cgT2);
    gameState.cgS=gameState.cgN1*gameState.cgT1-gameState.cgG*gameState.cgT1;
    GAMES.cowgrass.renderCG();
  },
  renderCG(){
    const n1=gameState.cgN1,t1=gameState.cgT1,n2=gameState.cgN2,t2=gameState.cgT2;
    const g=(n1*t1-n2*t2)/(t1-t2),s=n1*t1-g*t1;
    let extra='';
    if(g>0&&s>0){
      const n3=genRandInt(Math.ceil(g)+1,Math.ceil(g)+8);
      const t3=Math.round(s/(n3-g)*10)/10;
      extra='<p style="text-align:center;font-size:14px;color:#636e72">若 '+n3+' 头牛 → '+s.toFixed(0)+'÷('+n3+'-'+g.toFixed(1)+') ≈ <b>'+t3+'</b> 天</p>';
    }else{
      extra='<p style="text-align:center;font-size:13px;color:#ff6b6b">⚠️ 请确保方案1的总草量大于方案2（更多牛吃更短时间）</p>';
    }
    const c=document.getElementById('stageContent');
    c.innerHTML=
      '<p style="text-align:center;font-weight:700">调整牛数和天数，观察变化</p>'+
      '<div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">'+
      '<div class="slider-grp" style="max-width:160px"><label>方案1: 牛数</label><span class="slider-val" id="cgN1V">'+n1+'</span><input type="range" id="cgN1S" min="3" max="15" value="'+n1+'" oninput="GAMES.cowgrass.upd()"></div>'+
      '<div class="slider-grp" style="max-width:160px"><label>方案1: 天数</label><span class="slider-val" id="cgT1V">'+t1+'</span><input type="range" id="cgT1S" min="4" max="15" value="'+t1+'" oninput="GAMES.cowgrass.upd()"></div>'+
      '</div>'+
      '<div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">'+
      '<div class="slider-grp" style="max-width:160px"><label>方案2: 牛数</label><span class="slider-val" id="cgN2V">'+n2+'</span><input type="range" id="cgN2S" min="2" max="20" value="'+n2+'" oninput="GAMES.cowgrass.upd()"></div>'+
      '<div class="slider-grp" style="max-width:160px"><label>方案2: 天数</label><span class="slider-val" id="cgT2V">'+t2+'</span><input type="range" id="cgT2S" min="2" max="10" value="'+t2+'" oninput="GAMES.cowgrass.upd()"></div>'+
      '</div>'+
      '<p style="text-align:center;font-size:14px">每天长草: <b style="color:#ff6b6b">'+g.toFixed(1)+'</b> 份 | 原有草: <b style="color:#4ecdc4">'+s.toFixed(1)+'</b> 份</p>'+extra;
  },
  upd(){
    gameState.cgN1=parseInt(document.getElementById('cgN1S').value);
    gameState.cgT1=parseInt(document.getElementById('cgT1S').value);
    gameState.cgN2=parseInt(document.getElementById('cgN2S').value);
    gameState.cgT2=parseInt(document.getElementById('cgT2S').value);
    if(gameState.cgT1<=gameState.cgT2) gameState.cgT2=gameState.cgT1-1;
    document.getElementById('cgN1V').textContent=gameState.cgN1;
    document.getElementById('cgT1V').textContent=gameState.cgT1;
    document.getElementById('cgN2V').textContent=gameState.cgN2;
    document.getElementById('cgT2V').textContent=gameState.cgT2;
    document.getElementById('cgT2S').value=gameState.cgT2;
    GAMES.cowgrass.renderCG();
  },
  stage3(container){
    // Pre-verified combos: N1,T1,N2,T2,G,S,N3,Ans
    const probs=[
      {n1:6,t1:10,n2:8,t2:5,g:4,s:20,n3:9,ans:4,qn3:9},      // 20/(9-4)=4
      {n1:7,t1:8,n2:11,t2:4,g:3,s:32,n3:11,ans:4,qn3:11},     // 32/(11-3)=4
      {n1:7,t1:10,n2:11,t2:6,g:1,s:60,n3:13,ans:5,qn3:13},    // 60/(13-1)=5
      {n1:8,t1:10,n2:12,t2:6,g:2,s:60,n3:14,ans:5,qn3:14},    // 60/(14-2)=5
      {n1:6,t1:10,n2:8,t2:5,g:4,s:20,n3:14,ans:2,qn3:14},     // 20/(14-4)=2
      {n1:6,t1:10,n2:8,t2:5,g:4,s:20,n3:8,ans:5,qn3:8},       // 20/(8-4)=5
      {n1:7,t1:8,n2:11,t2:4,g:3,s:32,n3:7,ans:8,qn3:7},       // 32/(7-3)=8
      {n1:7,t1:10,n2:11,t2:6,g:1,s:60,n3:7,ans:10,qn3:7},     // 60/(7-1)=10
    ];
    const p=probs[Math.floor(Math.random()*probs.length)];
    gameState.cgAns=p.ans;
    container.innerHTML=
      '<p style="text-align:center;font-weight:700">一片草地每天匀速长草。'+p.n1+'头牛'+p.t1+'天吃完，'+p.n2+'头牛'+p.t2+'天吃完。'+p.qn3+'头牛几天吃完？</p>'+
      '<div class="answer-row"><span>需要</span><input class="answer-input" id="cgAns"><span>天</span><button class="btn btn-p" onclick="GAMES.cowgrass.check()">确认</button></div>'+
      '<p class="feedback" id="cgfb"></p><button class="btn btn-o" onclick="renderGameStage()">🔄 换一题</button>';
  },
  check(){
    const ans=parseInt(document.getElementById('cgAns').value),fb=document.getElementById('cgfb');
    if(isNaN(ans)){fb.textContent='请输入数字';return}
    if(ans===gameState.cgAns){fb.textContent='✅ 正确！先求每天长草量和原有草量';fb.className='feedback ok';setStars('cowgrass',3);celebrate();updateStarTotal()}
    else{fb.textContent='❌ 先算每天长草量=(N₁T₁-N₂T₂)÷(T₁-T₂)，再算原有草量';fb.className='feedback err'}
  }
};

// ==================== Init ====================
function init(){
  renderMenu();
  updateStarTotal();
}
init();
