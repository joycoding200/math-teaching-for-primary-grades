<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学思维小课堂</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar" id="topbar">
  <button class="back-btn" id="backBtn" onclick="goMenu()">←</button>
  <h1 id="topTitle">🧮 数学思维小课堂</h1>
  <div class="top-stats" id="topStats">
    <span class="stat-item" id="scoreDisplay" title="总积分">🏆 0</span>
    <span class="stat-item" id="streakDisplay" title="连胜">🔥 0</span>
    <span class="stat-item stars-total" id="starTotal" title="已获星数">⭐ 0</span>
    <span class="stat-item theme-btn" id="themeToggle" title="切换主题" onclick="toggleTheme()" style="display:none">🎨</span>
  </div>
</div>

<div class="container" id="container">
  <!-- 菜单视图 -->
  <div class="menu-view" id="menuView"></div>
  <!-- 游戏视图 -->
  <div class="game-view" id="gameView">
    <div class="game-header">
      <h2 id="gameTitle"></h2>
      <div class="desc" id="gameDesc"></div>
    </div>
    <div class="stage-tabs" id="stageTabs">
      <button class="stage-tab active" data-stage="1">🎯 看一看</button>
      <button class="stage-tab" data-stage="2">🤹 玩一玩</button>
      <button class="stage-tab" data-stage="3">🏆 练一练</button>
    </div>
    <div class="stage-content" id="stageContent"></div>
  </div>
</div>

<div class="cele" id="cele"></div>

<!-- JS 文件按依赖顺序加载 -->
<script src="js/data.js"></script>
<script src="js/framework.js"></script>
<script src="js/games.js"></script>
<script>init();</script>
</body>
</html>
