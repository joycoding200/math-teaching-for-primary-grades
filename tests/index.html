<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学思维小课堂 — 测试套件</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:800px;margin:20px auto;padding:0 16px;background:#f8f9fa;color:#212529}
  h1{color:#ff6b6b;text-align:center}
  .summary{padding:12px 20px;border-radius:12px;font-weight:700;text-align:center;margin:12px 0}
  .pass{background:#f0fffc;color:#00b894;border:2px solid #00b894}
  .fail{background:#fff5f5;color:#ff6b6b;border:2px solid #ff6b6b}
  .game-block{background:#fff;border-radius:12px;padding:12px 16px;margin:8px 0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .game-name{font-weight:700;font-size:15px}
  .test-item{font-size:13px;padding:2px 0;margin-left:16px}
  .ok{color:#00b894}.err{color:#ff6b6b}
  hr{border:0;border-top:1px solid #e9ecef;margin:8px 0}
</style>
</head>
<body>
<h1>🧪 数学思维小课堂 测试套件</h1>
<div id="summary"></div>
<div id="results"></div>

<script src="../js/data.js"></script>
<script src="../js/framework.js"></script>
<script src="test-answers.js"></script>
</body>
</html>
